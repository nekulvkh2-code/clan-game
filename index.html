<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шифрованный Клан-Чат</title>
    <!-- Подключаем шрифт Arial и библиотеку сети MQTT -->
    <script src="https://unpkg.com"></script>
    <style>
        body { background-color: #121212; color: #f5f5f5; font-family: Arial, sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        .screen { display: flex; flex-direction: column; height: 100%; }
        h2 { color: #3498db; text-align: center; font-size: 20px; margin-top: 10px; }
        input, select { background-color: #262626; color: #fff; border: 1px solid #444; padding: 12px; margin-bottom: 10px; border-radius: 8px; font-size: 16px; outline: none; }
        button { background-color: #2980b9; color: white; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        #chat_log { flex-grow: 1; background-color: #1a1a1a; border-radius: 8px; padding: 15px; overflow-y: auto; margin-bottom: 10px; white-space: pre-wrap; font-size: 15px; }
        .admin-panel { display: flex; gap: 5px; margin-bottom: 10px; }
        .btn-green { background-color: #27ae60; }
        .btn-red { background-color: #c0392b; }
        .btn-gray { background-color: #555; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<!-- ЭКРАН ВХОДА -->
<div id="login_screen" class="screen">
    <h2>ШИФРОВАННЫЙ КЛАН-ЧАТ</h2>
    <input type="text" id="name_input" placeholder="Ваше имя при входе">
    <select id="role_spinner">
        <option value="player">Я Игрок</option>
        <option value="leader">Я Владелец Клана (Хост)</option>
    </select>
    <input type="password" id="pass_input" placeholder="ПИН-код Клана (Буквы и цифры)">
    <button onclick="connectToGame()">ВОЙТИ В СЕССИЮ</button>
</div>

<!-- ИГРОВОЙ ЭКРАН -->
<div id="game_screen" class="screen hidden">
    <div class="admin-panel">
        <input type="text" id="current_name_input" style="flex-grow:1; margin:0;" placeholder="Сменить имя">
        <button class="btn-gray" onclick="changeName()">ИЗМ.</button>
    </div>
    <div id="info_label" style="font-size:13px; color:#aaa; margin-bottom:5px; italic;"></div>
    
    <div id="chat_log">--- Сквозное шифрование активно ---&#10;</div>

    <!-- Админ-панель лидера -->
    <div id="admin_panel" class="admin-panel hidden">
        <input type="text" id="target_input" style="flex-grow:1; margin:0;" placeholder="Ник игрока">
        <button class="btn-green" onclick="adminAction('ALLOW_USER')">Впустить</button>
        <button class="btn-red" onclick="adminAction('KICK_USER')">Удалить</button>
    </div>

    <input type="text" id="msg_input" placeholder="Введите сообщение...">
    <button class="btn-green" id="send_btn" onclick="sendMessage()">ОТПРАВИТЬ СООБЩЕНИЕ</button>
</div>

<script>
let username, roomPassword, isLeader, client, topic;
let approvedPlayers = new Set();

// Простейшее и надежное сквозное шифрование (XOR + Base64)
function crypt(str, key) {
    let output = "";
    for (let i = 0; i < str.length; i++) {
        output += String.fromCharCode(str.charCodeAt(i) ^ key.charCodeAt(i % key.length));
    }
    return output;
}
function packMsg(text, key) { return btoa(unescape(encodeURIComponent(crypt(text, key)))); }
function unpackMsg(b64, key) { try { return crypt(decodeURIComponent(escape(atob(b64))), key); } catch(e) { return "[Ошибка расшифровки]"; } }

function connectToGame() {
    username = document.getElementById("name_input").value.trim();
    roomPassword = document.getElementById("pass_input").value.trim();
    isLeader = document.getElementById("role_spinner").value === "leader";

    if (!username || !roomPassword) return;

    document.getElementById("login_screen").classList.add("hidden");
    document.getElementById("game_screen").classList.remove("hidden");
    document.getElementById("current_name_input").value = username;

    if (isLeader) {
        document.getElementById("admin_panel").classList.remove("hidden");
        approvedPlayers.add(username);
        document.getElementById("info_label").innerText = `Статус: Лидер | ПИН: ${roomPassword}`;
    } else {
        document.getElementById("msg_input").disabled = true;
        document.getElementById("send_btn").disabled = true;
        document.getElementById("info_label").innerText = "Статус: Ожидание авторизации Лидером...";
        updateChat(" Системный запрос на подключение отправлен...");
    }

    topic = "secure_clan_room_" + roomPassword;
    
    // Подключаемся по защищенному WebSoket-порту протокола MQTT (Браузерная защита TLS)
    client = mqtt.connect("wss://://hivemq.com");

    client.on('connect', () => {
        client.subscribe(topic);
        if (!isLeader) sendSecure(`REQUEST_JOIN:${username}`);
        else updateChat(" Клан успешно инициализирован в сети.");
    });

    client.on('message', (t, message) => {
        let rawText = unpackMsg(message.toString(), roomPassword);
        parseNetworkLogic(rawText);
    });
}

function sendSecure(rawText) {
    if (client) {
        let encrypted = packMsg(rawText, roomPassword);
        client.publish(topic, encrypted);
    }
}

function sendMessage() {
    let text = document.getElementById("msg_input").value.trim();
    if (text) {
        sendSecure(`MSG:${username}: ${text}`);
        document.getElementById("msg_input").value = "";
    }
}

function changeName() {
    let newName = document.getElementById("current_name_input").value.trim();
    if (newName && newName !== username) {
        let oldName = username;
        username = newName;
        if (isLeader || !document.getElementById("msg_input").disabled) {
            sendSecure(`RENAME:${oldName}:${newName}`);
        } else {
            updateChat(`Имя изменено локально на: ${username}`);
        }
    }
}

function adminAction(type) {
    let target = document.getElementById("target_input").value.trim();
    if (target && isLeader) {
        if (type === 'ALLOW_USER') approvedPlayers.add(target);
        if (type === 'KICK_USER') approvedPlayers.delete(target);
        sendSecure(`${type}:${target}`);
        updateChat(type === 'ALLOW_USER' ? `Игрок '${target}' авторизован.` : `Игрок '${target}' удален.`);
        document.getElementById("target_input").value = "";
    }
}

function parseNetworkLogic(text) {
    if (text.startsWith("REQUEST_JOIN:")) {
        let name = text.split(":")[1];
        if (isLeader) updateChat(` ЗАПРОС: Игрок '${name}' хочет войти.`);
    } 
    else if (text.startsWith("ALLOW_USER:")) {
        let name = text.split(":")[1];
        if (username === name && !isLeader) {
            document.getElementById("msg_input").disabled = false;
            document.getElementById("send_btn").disabled = false;
            document.getElementById("info_label").innerText = "Статус: Доступ разрешен. Вы в сети.";
            updateChat(" Владелец Клана открыл вам доступ в чат.");
        } else if (isLeader || !document.getElementById("msg_input").disabled) {
            updateChat(` Игрок '${name}' вошел в комнату.`);
        }
    } 
    else if (text.startsWith("KICK_USER:")) {
        let name = text.split(":")[1];
        if (username === name) {
            document.getElementById("chat_log").innerText = "";
            window.location.reload(); // Перезагружаем и очищаем всё
        } else if (isLeader || !document.getElementById("msg_input").disabled) {
            updateChat(` Игрок '${name}' был исключен из клана.`);
        }
    } 
    else if (text.startsWith("RENAME:")) {
        let [, old, n] = text.split(":");
        updateChat(` СИСТЕМА: '${old}' сменил ник на '${n}'`);
    } 
    else if (text.startsWith("MSG:")) {
        let content = text.substring(4);
        if (isLeader || !document.getElementById("msg_input").disabled) updateChat(content);
    }
}

function updateChat(text) {
    let log = document.getElementById("chat_log");
    log.innerText += text + "\n";
    log.scrollTop = log.scrollHeight;
}
</script>
</body>
</html>
