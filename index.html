<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат Клана (Защищенная E2EE сессия)</title>

    </script>

    <!-- Запасной загрузчик для сети MQTT через резервный глобальный стек -->
    <script src="https://unpkg.com"></script>

    <style>
        body { background-color: #121212; color: #f5f5f5; font-family: Arial, sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        .screen { display: flex; flex-direction: column; height: 100%; }
        h2 { color: #3498db; text-align: center; font-size: 20px; margin-top: 10px; }
        input, select { background-color: #262626; color: #fff; border: 1px solid #444; padding: 12px; margin-bottom: 10px; border-radius: 8px; font-size: 16px; outline: none; }
        button { background-color: #2980b9; color: white; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        #chat_log { flex-grow: 1; background-color: #1a1a1a; border-radius: 8px; padding: 15px; overflow-y: auto; margin-bottom: 10px; white-space: pre-wrap; font-size: 15px; }
        .admin-panel { display: flex; gap: 5px; margin-bottom: 10px; }
        .game-panel { background-color: #1e272e; border: 1px solid #34495e; padding: 12px; border-radius: 8px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 8px; }
        .game-title { font-size: 14px; font-weight: bold; color: #f1c40f; text-align: center; }
        .btn-green { background-color: #27ae60; }
        .btn-red { background-color: #c0392b; }
        .btn-gray { background-color: #555; }
        .btn-orange { background-color: #e67e22; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- ЭКРАН ВХОДА -->
    <div id="login_screen" class="screen">
        <h2>ЧАТ КЛАНА</h2>
        <input type="text" id="name_input" placeholder="Ваше имя при входе">
        <select id="role_spinner">
            <option value="player">Я Игрок</option>
            <option value="leader">Я Владелец Клана (Хост)</option>
        </select>
        <input type="password" id="pass_input" placeholder="ПИН-код Клана">
        <button onclick="connectToGame()">ВОЙТИ В СЕССИЮ</button>
    </div>

    <!-- ИГРОВОЙ ЭКРАН -->
    <div id="game_screen" class="screen hidden">
        <div class="admin-panel">
            <input type="text" id="current_name_input" style="flex-grow:1; margin:0;" placeholder="Сменить имя">
            <button class="btn-gray" onclick="changeName()">ИЗМ.</button>
        </div>
        <div id="info_label" style="font-size:13px; color:#aaa; margin-top:5px; margin-bottom:5px;"></div>
        
        <!-- ПАНЕЛЬ МИНИ-ИГРЫ -->
        <div class="game-panel">
            <div class="game-title">МИНИ-ИГРА: УГАДАЙ ЧИСЛО (1-100)</div>
            <div id="leader_game_controls" class="hidden" style="display: flex; gap: 5px;">
                <button class="btn-orange" style="flex-grow:1; padding:8px;" onclick="generateSecretNumber()">Загадать новое число</button>
            </div>
            <div id="player_game_controls" style="display: flex; gap: 5px;">
                <input type="number" id="guess_input" style="margin:0; flex-grow:1; padding:8px;" placeholder="Ваш вариант">
                <button class="btn-orange" style="padding:8px 15px;" onclick="sendGuess()">Проверить</button>
            </div>
        </div>

        <div id="chat_log">--- Сессия запущена ---</div>
        
        <!-- Панель управления для Лидера -->
        <div id="admin_panel" class="admin-panel hidden">
            <input type="text" id="target_input" style="flex-grow:1; margin:0;" placeholder="Ник игрока">
            <button class="btn-green" onclick="adminAction('ALLOW_USER')">Впустить</button>
            <button class="btn-red" onclick="adminAction('KICK_USER')">Удалить</button>
        </div>
        
        <input type="text" id="msg_input" placeholder="Введите сообщение...">
        <button class="btn-green" id="send_btn" onclick="sendMessage()">ОТПРАВИТЬ</button>
    </div>

<script>
var username = "";
var roomPassword = "";
var isLeader = false;
var client = null;
var topic = "";
var secretNumber = null;

// Стандартное защищенное кодирование XOR без конфликтов библиотек
function packMsg(text, key) {
    var output = "";
    for (var i = 0; i < text.length; i++) {
        output += String.fromCharCode(text.charCodeAt(i) ^ key.charCodeAt(i % key.length));
    }
    return btoa(unescape(encodeURIComponent(output)));
}

function unpackMsg(b64, key) {
    try {
        var text = decodeURIComponent(escape(atob(b64)));
        var output = "";
        for (var i = 0; i < text.length; i++) {
            output += String.fromCharCode(text.charCodeAt(i) ^ key.charCodeAt(i % key.length));
        }
        return output;
    } catch(e) {
        return "[Ошибка расшифровки данных]";
    }
}

function connectToGame() {
    try {
        username = document.getElementById("name_input").value.trim();
        roomPassword = document.getElementById("pass_input").value.trim();
        isLeader = document.getElementById("role_spinner").value === "leader";
        
        if (!username || !roomPassword) {
            alert("Пожалуйста, заполните все поля!");
            return;
        }

        // Проверка наличия сетевого стека MQTT
        if (typeof mqtt === "undefined") {
            alert("Ошибка: Стек сети MQTT недоступен. Проверьте сеть.");
            return;
        }

        document.getElementById("login_screen").classList.add("hidden");
        document.getElementById("game_screen").classList.remove("hidden");
        document.getElementById("current_name_input").value = username;

        if (isLeader) {
            document.getElementById("admin_panel").classList.remove("hidden");
            document.getElementById("leader_game_controls").classList.remove("hidden");
            document.getElementById("player_game_controls").classList.add("hidden");
            document.getElementById("info_label").innerText = "Статус: Лидер | ПИН: " + roomPassword;
        } else {
            document.getElementById("msg_input").disabled = true;
            document.getElementById("send_btn").disabled = true;
            document.getElementById("info_label").innerText = "Статус: Ожидание авторизации Лидером... | ПИН: " + roomPassword;
            updateChat(" Системный запрос на подключение отправлен...");
        }

        topic = "nekulvkh2_clan_room_" + roomPassword;
        client = mqtt.connect("wss://://hivemq.com");

        client.on('connect', function() {
            client.subscribe(topic);
            if (!isLeader) {
                sendSecure("REQUEST_JOIN:" + username);
            } else {
                updateChat(" Клан успешно инициализирован в защищенной комнате.");
            }
        });

        client.on('message', function(t, message) {
            var rawText = unpackMsg(message.toString(), roomPassword);
            parseNetworkLogic(rawText);
        });

        client.on('error', function(err) {
            updateChat(" Ошибка сети: " + err.message);
        });
    } catch (err) {
        alert("Ошибка выполнения connectToGame: " + err.message);
    }
}

function sendSecure(rawText) {
    if (client && client.connected) {
        var encrypted = packMsg(rawText, roomPassword);
        client.publish(topic, encrypted);
    } else {
        updateChat(" Ошибка: Соединение с брокером потеряно!");
    }
}

function sendMessage() {
    var text = document.getElementById("msg_input").value.trim();
    if (text) {
        sendSecure("MSG:" + username + ":" + text);
        document.getElementById("msg_input").value = "";
    }
}

function generateSecretNumber() {
    secretNumber = Math.floor(Math.random() * 100) + 1;
    sendSecure("GAME_START:" + username);
    updateChat(" СИСТЕМА: Вы загадали число. Игроки могут угадывать!");
}

function sendGuess() {
    var guess = document.getElementById("guess_input").value.trim();
    if (guess) {
        sendSecure("GAME_GUESS:" + username + ":" + guess);
        document.getElementById("guess_input").value = "";
    }
}

function changeName() {
    var newName = document.getElementById("current_name_input").value.trim();
    if (newName && newName !== username) {
        var oldName = username;
        username = newName;
        if (isLeader || !document.getElementById("msg_input").disabled) {
            sendSecure("RENAME:" + oldName + ":" + newName);
        } else {
            updateChat("Имя изменено локально на: " + username);
        }
    }
}

function adminAction(type) {
    var target = document.getElementById("target_input").value.trim();
    if (target && isLeader) {
        sendSecure(type + ":" + target);
        updateChat(type === 'ALLOW_USER' ? "Игрок '" + target + "' авторизован." : "Игрок '" + target + "' удален.");
        document.getElementById("target_input").value = "";
    }
}

function parseNetworkLogic(text) {
    var separatorIndex = text.indexOf(":");
    if (separatorIndex === -1) return;

    var command = text.substring(0, separatorIndex);
    var data = text.substring(separatorIndex + 1);

    if (command === "REQUEST_JOIN") {
        var name = data;
        if (isLeader) {
            updateChat(" ЗАПРОС: Игрок '" + name + "' хочет войти. Введите его ник в поле внизу и нажмите Впустить.");
        }
    } 
    else if (command === "ALLOW_USER") {
        var name = data;
        if (username === name && !isLeader) {
            document.getElementById("msg_input").disabled = false;
            document.getElementById("send_btn").disabled = false;
            document.getElementById("info_label").innerText = "Статус: Доступ разрешен. Вы в сети. | ПИН: " + roomPassword;
            updateChat(" Владелец Клана открыл вам доступ в чат.");
        } else if (isLeader || !document.getElementById("msg_input").disabled) {
            updateChat(" Игрок '" + name + "' вошел в комнату.");
        }
    } 
    else if (command === "KICK_USER") {
        var name = data;
        if (username === name) {
            document.getElementById("chat_log").innerText = "";
            window.location.reload();
        } else if (isLeader || !document.getElementById("msg_input").disabled) {
            updateChat(" Игрок '" + name + "' был исключен из клана.");
        }
    } 
    else if (command === "RENAME") {
        var nextSep = data.indexOf(":");
        if (nextSep !== -1) {
            var oldName = data.substring(0, nextSep);
            var newName = data.substring(nextSep + 1);
            updateChat(" СИСТЕМА: '" + oldName + "' сменил ник на '" + newName + "'");
        }
    } 
    else if (command === "MSG") {
        var nextSep = data.indexOf(":");
        if (nextSep !== -1) {
            var sender = data.substring(0, nextSep);
            var messageText = data.substring(nextSep + 1);
            if (isLeader || !document.getElementById("msg_input").disabled) {
                updateChat(sender + ": " + messageText);
            }
        }
    } 
    else if (command === "GAME_START") {
        var leaderName = data;
        updateChat(" ИГРА: Лидер " + leaderName + " загадал новое число от 1 до 100! Попробуйте угадать.");
    } 
    else if (command === "GAME_GUESS") {
        var nextSep = data.indexOf(":");
        if (nextSep !== -1) {
            var pName = data.substring(0, nextSep);
            var pGuess = parseInt(data.substring(nextSep + 1));
            if (isLeader) {
                if (secretNumber === null) return;
                if (pGuess === secretNumber) {
                    sendSecure("GAME_WIN:" + pName + ":" + secretNumber);
                    updateChat(" ИГРА: Игрок '" + pName + "' угадал число " + secretNumber + "! Игра окончена.");
                    secretNumber = null;
                } else if (pGuess < secretNumber) {
                    sendSecure("GAME_HINT:" + pName + ":Загаданное число БОЛЬШЕ, чем " + pGuess);
                } else {
                    sendSecure("GAME_HINT:" + pName + ":Загаданное число МЕНЬШЕ, чем " + pGuess);
                }
            }
        }
    } 
    else if (command === "GAME_WIN") {
        var nextSep = data.indexOf(":");
        if (nextSep !== -1) {
            var pName = data.substring(0, nextSep);
            var sNum = data.substring(nextSep + 1);
            updateChat(" ИГРА 🎉: Победитель '" + pName + "'! Было загадано число " + sNum + ".");
        }
    } 
    else if (command === "GAME_HINT") {
        var nextSep = data.indexOf(":");
        if (nextSep !== -1) {
            var pName = data.substring(0, nextSep);
            var hintText = data.substring(nextSep + 1);
            if (username === pName) {
                updateChat(" ПОДКАЗКА 💡: " + hintText);
            }
        }
    }
}

function updateChat(text) {
    var log = document.getElementById("chat_log");
    log.innerText += text + "\n";
    log.scrollTop = log.scrollHeight;
}
</script>
</body>
</html>
